name: test

permissions: 
  contents: read

on:
  workflow_dispatch: {}

jobs:
  test-to-get-custom-properties:
    runs-on: ubuntu-latest
    steps:
      - name: Test custom properties endpoint
        run: |
             curl -v -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                  https://api.github.com/repos/${{ github.repository }}/properties/values
